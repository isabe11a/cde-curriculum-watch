name: CDE Curriculum Watch

on:
  schedule:
    # odd minute helps avoid running exactly on common bot-scrape times
    - cron: "37 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cde-curriculum-watch
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git fetch origin
          git checkout ${{ github.ref_name }}
          git pull --rebase origin ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run monitor
        id: monitor
        continue-on-error: true
        run: |
          python monitor.py
          cat report.txt

      - name: Commit updated baseline and daily report tracker
        if: always()
        run: |
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"

          git add baseline.json report.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update CDE curriculum baseline [skip ci]"
          git push

      - name: Build email body
        if: always() && (steps.monitor.outcome == 'failure' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        run: |
          cat report.txt > email_body.txt

          cat >> email_body.txt <<EOF

          ---

          GitHub run:
          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Send email alert
        if: always() && (steps.monitor.outcome == 'failure' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: "CDE Watch Bot <${{ secrets.MAIL_USERNAME }}>"
          subject: "${{ steps.monitor.outcome == 'failure' && '📚 CDE Curriculum Watch: Change Detected' || 'CDE Curriculum Watch: Daily Report' }}"
          body: file://email_body.txt

      - name: Mark job failed if change detected
        if: steps.monitor.outcome == 'failure'
        run: exit 1
